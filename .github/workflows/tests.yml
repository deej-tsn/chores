name: Run Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"  # or whatever you're using

      - name: Install uv
        working-directory: ./BE
        run: pip install uv

      - name: Install dependencies
        working-directory: ./BE
        run: uv sync

      - name: Run tests
        working-directory: ./BE
        run: uv run pytest tests -v